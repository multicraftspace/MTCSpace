<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  padding:20px;
}

/* PROFILE CARD */
.profile{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:20px;
  padding:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.top{
  display:flex;
  gap:15px;
  align-items:center;
}

.pfp{
  width:80px;
  height:80px;
  border-radius:50%;
  object-fit:cover;
}

.name{
  font-size:20px;
  font-weight:bold;
}

.check{
  width:18px;
  margin-left:5px;
}

.desc{
  margin-top:10px;
  opacity:0.8;
}

/* BUTTON */
.btn{
  padding:10px 14px;
  border-radius:10px;
  border:2px solid #a855f7;
  background:#a855f7;
  color:white;
  cursor:pointer;
  font-family:'MultiCraft';
  margin-top:10px;
}

/* SERVERS */
.servers{
  max-width:900px;
  margin:20px auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:15px;
}

/* CARD */
.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.1);
  cursor:pointer;
}

.bg{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card-content{
  padding:10px;
}

.card-name{
  font-size:14px;
  font-weight:bold;
}

.card-desc{
  font-size:12px;
  opacity:0.7;
  margin-top:5px;
}
</style>
</head>

<body>

<div class="header">
  <button class="btn" onclick="location.href='index.html'">← Back</button>
</div>

<div class="profile">
  <div class="top">
    <img id="pfp" class="pfp">
    <div>
      <div id="name" class="name"></div>
      <div id="subs"></div>
    </div>
  </div>

  <div id="desc" class="desc"></div>

  <textarea id="editDesc" style="width:100%;display:none;margin-top:10px;"></textarea>
  <button id="saveBtn" class="btn" style="display:none;">Save</button>

  <button id="subBtn" class="btn"></button>
</div>

<div class="servers">
  <h3 style="text-align:center;">Servers</h3>
  <div id="grid" class="grid"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, updateDoc,
  collection, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega"
});

const db = getFirestore(app);

const username = new URLSearchParams(location.search).get("u");
const currentUser = localStorage.getItem("user");

/* LOAD PROFILE */
async function load(){
  const snap = await getDoc(doc(db,"users",username));
  if(!snap.exists()) return;

  const u = snap.data();

  name.innerHTML = username + (u.verified?'<img class="check" src="assets/check.png">':'');
  subs.innerText = (u.subs||0) + " subscribers";
  desc.innerText = u.description || "No description";

  pfp.src = (u.pfpURL && u.pfpURL!=="no") ? u.pfpURL : "assets/default.png";

  /* OWNER */
  if(currentUser === username){
    editDesc.style.display="block";
    saveBtn.style.display="inline-block";
    subBtn.style.display="none";

    editDesc.value = u.description || "";
  } else {
    subBtn.innerText="Subscribe";
  }

  loadServers();
}

/* SAVE DESC */
saveBtn.onclick = async ()=>{
  await updateDoc(doc(db,"users",username),{
    description: editDesc.value
  });
  desc.innerText = editDesc.value;
};

/* SUBSCRIBE */
subBtn.onclick = async ()=>{
  if(!currentUser) return alert("Sign up first");

  await updateDoc(doc(db,"users",username),{
    subs: (await getDoc(doc(db,"users",username))).data().subs + 1
  });

  subBtn.innerText="Subscribed";
};

/* LOAD USER SERVERS */
async function loadServers(){
  const snap = await getDocs(collection(db,"servers"));

  grid.innerHTML="";

  snap.forEach(d=>{
    const s = d.data();
    if(s.author !== username) return;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <img class="bg" src="${s.bg||'bgs/bg1.png'}">
      <div class="card-content">
        <div class="card-name">${s.name}</div>
        <div class="card-desc">${s.desc}</div>
      </div>
    `;

    card.onclick = ()=>{
      location.href="server.html?code="+d.id;
    };

    grid.appendChild(card);
  });
}

load();
</script>

</body>
</html>
