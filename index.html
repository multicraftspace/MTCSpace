<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://mtcspace.com/m">
<title>MTCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft',sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{height:40px;}

.right{display:flex;gap:10px;align-items:center;}

button{
  font-family:'MultiCraft';
  cursor:pointer;
}

/* BUTTON */
.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  transition:0.25s;
}
.btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}
.btn:active{transform:scale(0.9);}

/* SEARCH */
.search{
  width:100%;
  padding:12px;
  border:none;
  border-bottom:2px solid #a855f7;
  outline:none;
  font-family:'MultiCraft';
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  display:flex;
  flex-direction:column;
  position:relative;
  border:2px solid transparent;
}

/* BADGES */
.card.recommended{border:2px solid cyan;}
.card.trending{border:2px solid red;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}

.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}
.badge.trending{background:red;}

/* CONTENT */
.content{padding:12px;display:flex;flex-direction:column;flex:1;}

.title-row{display:flex;align-items:center;gap:6px;}

.author{
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;

  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  gap:6px;
  align-items:center;
}

.play-btn{
  flex:1;
}

.fav-btn{
  width:40px;
  height:40px;
  border-radius:10px;
  border:2px solid #a855f7;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
}

.fav-btn.active{background:#ffd6ff;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>

  <div class="right">
    <button class="btn" onclick="addServer()">+ Add my server</button>
    <button class="btn" onclick="support()">📧</button>
    <button class="btn" id="authBtn" onclick="authAction()">Sign Up</button>
  </div>
</div>

<input class="search" placeholder="Search servers..." oninput="render(this.value)">

<div id="grid" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega"
});
const db=getFirestore(app);

/* USERS */
let user=localStorage.getItem("user");
if(user){
  document.getElementById("authBtn").innerText=user;
}

/* SERVERS */
let servers=[
{id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, and more very cool features.",code:"M5R9X1NY",author:"RedWorld"},
{id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",code:"KAAYBNDP",author:"Elder"},
{id:3,name:"FlatWorld",desc:"Creative Server",code:"MCSRVR03",author:"Unknown"},
{id:4,name:"New Types PvP",desc:"Awesome PvP server, with a lot fun features and gamemodes.",code:"JLIVC3V9",author:"Unknown"},
{id:5,name:"SMP12",desc:"In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!",code:"94D92LVD",author:"Jared12"},
{id:6,name:"Stone Simulator",desc:"In here, we live underground! Also, we buy items from The Shop! With currencies such as Stone, Cobblestone, and more!",code:"XX9IXQ6H",author:"Jared12"},
{id:7,name:"Parkour Cubicles",desc:"In here, YOU will try to beat the impossible 36 cubicles of the server to escape!",code:"QVZACNG5",author:"Jared12"}
];

async function load(){
  await Promise.all(servers.map(async s=>{
    const snap=await getDoc(doc(db,"servers",s.code));
    s.visits=snap.exists()?snap.data().visits||0:0;
  }));

  render("");
}

function render(search){
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  let filtered=servers.filter(s=>s.name.toLowerCase().includes(search.toLowerCase()));

  const max=Math.max(...filtered.map(s=>s.visits));
  filtered.forEach(s=>{
    s.trending=s.visits>max*0.6;
  });

  filtered.sort((a,b)=>b.visits-a.visits);

  filtered.forEach(s=>{
    const favs=JSON.parse(localStorage.getItem("favs")||"[]");

    const card=document.createElement("div");
    card.className="card "+(s.trending?"trending":"");

    card.innerHTML=`
      ${s.trending?'<div class="badge trending">🔥 TRENDING</div>':''}
      <div class="content">
        <div class="title-row">
          <div>${s.name}</div>
        </div>
        <div class="author">by ${s.author}</div>
        <div class="desc">${s.desc}</div>

        <div class="actions">
          <button class="btn play-btn" onclick="join('${s.code}')">Play</button>
          <div class="fav-btn ${favs.includes(s.code)?"active":""}" onclick="fav('${s.code}',this)">❤</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.fav=function(code,el){
  let favs=JSON.parse(localStorage.getItem("favs")||"[]");
  if(favs.includes(code)){
    favs=favs.filter(x=>x!==code);
    el.classList.remove("active");
  }else{
    favs.push(code);
    el.classList.add("active");
  }
  localStorage.setItem("favs",JSON.stringify(favs));
}

window.join=async function(code){
  const ref=doc(db,"servers",code);
  try{await updateDoc(ref,{visits:increment(1)});}
  catch{await setDoc(ref,{visits:1});}
  location.href="server.html?code="+code;
}

window.addServer=function(){
  if(!user){
    alert("Sign up first");
    return;
  }
  location.href="mailto:add@mtcspace.com";
}

window.support=function(){
  location.href="mailto:contact@mtcspace.com";
}

window.authAction=function(){
  const u=prompt("Username?");
  if(u){
    localStorage.setItem("user",u);
    location.reload();
  }
}

load();
</script>
</body>
</html>
