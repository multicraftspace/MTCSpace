<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 32px;
  border-bottom: 2px solid #a855f7;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

.card {
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 15px 35px rgba(168,85,247,0.25);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.03);
}

.bg {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 15px;
}

.server-name {
  font-size: 20px;
  margin-bottom: 10px;
}

.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.play-btn {
  padding: 10px 16px;
  border-radius: 12px;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 5px 15px rgba(168,85,247,0.4);
}

.play-btn:hover {
  transform: scale(1.1);
}

.play-btn:active {
  transform: scale(0.9);
}

.heart {
  width: 26px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">MCspace</div>

<div class="grid" id="grid"></div>

<script>
const servers = [
  { id: 1, name: "Test Server", code: "abc123" }
];

const grid = document.getElementById("grid");

servers.forEach(server => {
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img class="bg" src="bg${server.id}.png">
    <div class="content">
      <div class="server-name">${server.name}</div>
      <div class="actions">
        <div class="play-btn" onclick="joinServer('${server.code}')">Play</div>
        <img class="heart" src="heart${server.id}.png">
      </div>
    </div>
  `;

  grid.appendChild(card);
});

function joinServer(code) {
  window.location.href = "server.html?code=" + code;
}
</script>

</body>
</html>
