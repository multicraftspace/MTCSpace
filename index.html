<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  border-bottom: 2px solid #a855f7;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  height: 40px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 25px;
  padding: 30px;
}

.card {
  border-radius: 20px;
  overflow: hidden;
  background: white;
  box-shadow: 0 15px 35px rgba(168,85,247,0.25);
  transition: 0.3s;
  border: 2px solid transparent;
}

.card.trending {
  border: 2px solid red;
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

.content {
  padding: 12px;
}

.title-row {
  display: flex;
  gap: 8px;
  align-items: center;
}

.desc {
  font-size: 13px;
  opacity: 0.7;
  margin-top: 5px;
}

.actions {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.play-btn {
  padding: 8px 14px;
  border-radius: 10px;
  background: #a855f7;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.play-btn:hover {
  transform: scale(1.1);
}

.visits {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="logo.png">
    <div>MCspace</div>
  </div>
</div>

<div class="grid" id="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let servers = [
  { id: 1, name: "Erratic SMP", desc: "Good MultiCraft SMP with no areas, and more very cool features.", code: "M5R9X1NY" }
];

async function loadVisits(server) {
  const ref = doc(db, "servers", server.code);
  const snap = await getDoc(ref);

  if (snap.exists()) {
    server.visits = snap.data().visits || 0;
  } else {
    server.visits = 0;
  }
}

async function init() {
  await Promise.all(servers.map(loadVisits));

  // Sort by visits
  servers.sort((a,b) => b.visits - a.visits);

  const grid = document.getElementById("grid");

  servers.forEach(server => {
    const card = document.createElement("div");

    const trending = server.visits >= 5;

    card.className = "card" + (trending ? " trending" : "");

    card.innerHTML = `
      <img class="bg" src="bg${server.id}.png">
      <div class="content">
        <div class="title-row">
          <img src="heart${server.id}.png" width="18">
          <div>${server.name}</div>
        </div>
        <div class="desc">${server.desc}</div>
        <div class="actions">
          <div class="visits">${server.visits} plays</div>
          <div class="play-btn" onclick="joinServer('${server.code}')">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

window.joinServer = async function(code) {
  const ref = doc(db, "servers", code);

  try {
    await updateDoc(ref, {
      visits: increment(1)
    });
  } catch {
    await setDoc(ref, { visits: 1 });
  }

  window.location.href = "server.html?code=" + code;
};

init();
</script>

</body>
</html>
