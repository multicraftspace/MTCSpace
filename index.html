<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft', sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo{display:flex;align-items:center;gap:10px;}
.logo img{height:40px;}

/* SEARCH */
.search-bar{
  margin:15px 25px;
  display:flex;
  gap:10px;
}

.search-bar input{
  flex:1;
  padding:10px;
  border-radius:12px;
  border:2px solid #a855f7;
  font-family:'MultiCraft';
}

.filter-btn{
  padding:10px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:white;
  cursor:pointer;
}

/* BUTTONS */
.add-btn,.play-btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}

.add-btn:hover,.play-btn:hover{
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

/* CARD */
.card{
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  display:flex;
  flex-direction:column;
  position:relative;
  transition:0.3s;
}

/* 🔥 GLOW EFFECT */
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 25px rgba(168,85,247,0.6);
}

.card.trending{border:2px solid red;}
.card.recommended{border:2px solid cyan;}

/* BADGES */
.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}
.badge.trending{background:red;}
.badge.recommended{
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

/* IMAGE */
.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

/* CONTENT */
.content{
  padding:12px;
  display:flex;
  flex-direction:column;
  flex:1;
}

.title-row{display:flex;gap:6px;align-items:center;}

.name{
  font-weight:bold;
  font-size:14px;
  word-break:break-word;
}

.author{
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
  display:flex;
  gap:5px;
  align-items:center;
}

.check{width:14px;}

.desc{
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
  display:-webkit-box;
  -webkit-line-clamp:3;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.actions{
  margin-top:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.visits{
  font-size:12px;
  opacity:0.7;
}

/* FAVORITE ICON */
.fav{
  position:absolute;
  top:10px;
  right:10px;
  cursor:pointer;
  font-size:18px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<!-- 🔍 SEARCH -->
<div class="search-bar">
  <input id="search" placeholder="Search servers...">
  <button class="filter-btn" onclick="toggleFavFilter()">⭐</button>
</div>

<div id="grid" class="grid"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega",
  storageBucket:"mcspaceomega.firebasestorage.app",
  messagingSenderId:"984192110931",
  appId:"1:984192110931:web:d7392a9815ab248c6391a6"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

const verifiedUsers=["RedWorld"];
const recommendedServers=["M5R9X1NY"];

let showFavOnly=false;

/* FAVORITES */
function getFavs(){
  return JSON.parse(localStorage.getItem("favorites")||"[]");
}

function toggleFavFilter(){
  showFavOnly=!showFavOnly;
  render();
}

/* SERVERS */
let servers=[ /* KEEP YOUR SAME ARRAY HERE */ ];

async function loadVisits(s){
  const snap=await getDoc(doc(db,"servers",s.code));
  s.visits=snap.exists()?snap.data().visits||0:0;
  s.lastVisits=snap.exists()?snap.data().lastVisits||0:0;
  s.growth=s.visits-s.lastVisits;
}

async function init(){
  await Promise.all(servers.map(loadVisits));
  servers.sort((a,b)=>b.visits-a.visits);
  render();
}

function render(){
  const grid=document.getElementById("grid");
  const query=document.getElementById("search").value.toLowerCase();
  const favs=getFavs();

  grid.innerHTML="";

  const maxGrowth=Math.max(...servers.map(s=>s.growth));

  servers.forEach(s=>{
    if(showFavOnly && !favs.includes(s.code)) return;

    if(!s.name.toLowerCase().includes(query) &&
       !s.author.toLowerCase().includes(query)) return;

    const trending=!recommendedServers.includes(s.code) &&
      s.growth>=Math.max(10, maxGrowth*0.8); // 🔥 FIXED

    const card=document.createElement("div");
    card.className="card"+
      (trending?" trending":"")+
      (recommendedServers.includes(s.code)?" recommended":"");

    card.innerHTML=`
      <div class="fav" onclick="toggleFav('${s.code}',event)">
        ${favs.includes(s.code)?"⭐":"☆"}
      </div>

      ${recommendedServers.includes(s.code)?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="title-row">
          <img src="${s.heart}" width="18">
          <div class="name">${s.name}</div>
        </div>

        <div class="author">
          by ${s.author}
          ${verifiedUsers.includes(s.author)?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div class="visits">${s.visits} visits</div>
          <div class="play-btn" onclick="joinServer('${s.code}')">Play</div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

/* FAVORITE TOGGLE */
window.toggleFav=function(code,e){
  e.stopPropagation();
  let favs=getFavs();

  if(favs.includes(code)) favs=favs.filter(c=>c!==code);
  else favs.push(code);

  localStorage.setItem("favorites",JSON.stringify(favs));
  render();
};

window.joinServer=(code)=>{
  location.href="server.html?code="+code;
};

document.getElementById("search").addEventListener("input",render);

init();
</script>

</body>
</html>
