<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MCSpace</title>

<style>
@font-face {
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body {
  margin:0;
  font-family:'MultiCraft';
  background:radial-gradient(circle at top,#fff,#f3e8ff);
}

.header {
  display:flex;
  justify-content:space-between;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo {display:flex;gap:10px;align-items:center;}
.logo img {height:40px;}

.add-btn {
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

.card {
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  position:relative;
}

.badge {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:8px;
  color:white;
}

.badge.trending { background:red; }
.badge.recommended {
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

.bg { width:100%; aspect-ratio:16/9; object-fit:cover; }

.content { padding:12px; display:flex; flex-direction:column; }

.name { font-weight:bold; word-break:break-word; }

.author {
  font-size:12px;
  opacity:0.7;
  margin-top:4px;
}

.desc {
  font-size:13px;
  opacity:0.7;
  margin-top:6px;
}

.actions {
  margin-top:auto;
  display:flex;
  justify-content:space-between;
}

.play-btn {
  background:#a855f7;
  color:white;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
}

.modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
  z-index:9999;
}

.modal-box {
  background:white;
  padding:20px;
  border-radius:12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>

  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add your server</h3>
    <p>DM @rwo1ld in Discord</p>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega",
  storageBucket:"mcspaceomega.firebasestorage.app",
  messagingSenderId:"984192110931",
  appId:"1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const recommendedServers=["M5R9X1NY"];

const servers=[
{ id:1,name:"Erratic SMP",code:"M5R9X1NY",author:"RedWorld",desc:"Good MultiCraft SMP with no areas, and more very cool features.",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
{ id:2,name:"Ronaldo Vs Messi",code:"KAAYBNDP",author:"Elder",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
{ id:3,name:"FlatWorld",code:"MCSRVR03",author:"Unknown",desc:"Creative server where you can build anything you want.",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
{ id:4,name:"New Types PvP",code:"JLIVC3V9",author:"Unknown",desc:"Awesome PvP server with a lot fun features and gamemodes.",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
{ id:5,name:"SMP12",code:"94D92LVD",author:"Jared12",desc:"In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
{ id:6,name:"Stone Simulator",code:"XX9IXQ6H",author:"Jared12",desc:"In here, we live underground! Also, we buy items from The Shop!",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
{ id:7,name:"Parkour Cubicles",code:"QVZACNG5",author:"Jared12",desc:"Beat all 36 cubicles!",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function init(){
  let data=[];

  for(const s of servers){
    const snap=await getDoc(doc(db,"servers",s.code));
    const visits=snap.exists()?snap.data().visits||0:0;
    const last=snap.exists()?snap.data().lastVisits||0:0;

    data.push({...s,visits,growth:visits-last});
  }

  const maxGrowth=Math.max(...data.map(s=>s.growth));

  const grid=document.getElementById("grid");

  data.forEach(s=>{
    const recommended=recommendedServers.includes(s.code);
    const trending=!recommended && s.growth >= maxGrowth*0.6 && s.growth>0;

    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      ${recommended?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="name">${s.name}</div>
        <div class="author">by ${s.author}</div>
        <div class="desc">${s.desc}</div>

        <div class="actions">
          <div>${s.visits} visits</div>
          <div class="play-btn" onclick="location.href='server.html?code=${s.code}'">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

init();
</script>

</body>
</html>
