<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCSpace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft', sans-serif;
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
  color: #2d0b4e;
}

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
}

.logo {display:flex;gap:10px;align-items:center;}
.logo img {height:40px;}

.add-btn, .play-btn {
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  transition:0.25s;
}
.add-btn:hover, .play-btn:hover {
  transform:translateY(-2px) scale(1.05);
  box-shadow:0 8px 20px rgba(168,85,247,0.4);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

.card {
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  position:relative;
}

.card.trending {border:2px solid red;}
.card.recommended {border:2px solid cyan;}

.badge {
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  color:white;
}
.badge.trending {background:red;}
.badge.recommended {
  background:linear-gradient(90deg,#00e5ff,#00ffa6);
  color:black;
}

.bg {
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content {padding:12px;}
.name {font-weight:bold;}
.author {font-size:12px;opacity:0.7;}

.modal {
  position:fixed;
  inset:0;
  display:none;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.4);
}
.modal-box {
  background:white;
  padding:25px;
  border-radius:20px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MCSpace</div>
  </div>
  <button class="add-btn" onclick="openModal()">+ Add my server</button>
</div>

<div id="grid" class="grid"></div>

<div id="modal" class="modal">
  <div class="modal-box">
    <h3>Add your server</h3>
    <p>DM @rwo1ld in discord to add your server.</p>
    <button class="add-btn" onclick="closeModal()">Close</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const verifiedUsers = ["RedWorld"];
const recommendedServers = ["M5R9X1NY"];

const servers = [
  {id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, and more very cool features.",code:"M5R9X1NY",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
  {id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS...",code:"KAAYBNDP",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
  {id:3,name:"FlatWorld",desc:"Creative server where you can build anything.",code:"MCSRVR03",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
  {id:4,name:"New Types PvP",desc:"Awesome PvP server with many gamemodes.",code:"JLIVC3V9",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
  {id:5,name:"SMP12",desc:"Open world SMP where you can do anything!",code:"94D92LVD",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
  {id:6,name:"Stone Simulator",desc:"Mine, trade and live underground economy.",code:"XX9IXQ6H",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
  {id:7,name:"Parkour Cubicles",desc:"Beat all 36 cubicles if you can!",code:"QVZACNG5",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function init(){
  const grid=document.getElementById("grid");

  for(const s of servers){
    const snap = await getDoc(doc(db,"servers",s.code));
    const data = snap.exists()?snap.data():{};
    s.visits = data.visits||0;
    s.lastVisits = data.lastVisits||0;
    s.growth = s.visits - s.lastVisits;
  }

  const maxGrowth = Math.max(...servers.map(s=>s.growth));

  servers.forEach(s=>{
    const recommended = recommendedServers.includes(s.code);
    const trending = !recommended && s.growth === maxGrowth && s.growth > 0;
    const verified = verifiedUsers.includes(s.author);

    const el=document.createElement("div");
    el.className="card"+(recommended?" recommended":"")+(trending?" trending":"");

    el.innerHTML=`
      ${recommended?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}
      <img class="bg" src="${s.bg}">
      <div class="content">
        <div class="name">${s.name}</div>
        <div class="author">by ${s.author} ${verified?'<img src="assets/check.png" width="12">':''}</div>
        <div>${s.desc}</div>
        <div class="actions">
          <div>${s.visits}</div>
          <div class="play-btn" onclick="joinServer('${s.code}')">Play</div>
        </div>
      </div>`;
    grid.appendChild(el);
  });
}

window.joinServer = async code=>{
  const ref = doc(db,"servers",code);
  const snap = await getDoc(ref);
  const v = snap.exists()?snap.data().visits||0:0;

  try{
    await updateDoc(ref,{visits:increment(1),lastVisits:v});
  }catch{
    await setDoc(ref,{visits:1,lastVisits:0});
  }

  location.href="server.html?code="+code;
};

window.openModal=()=>document.getElementById("modal").style.display="flex";
window.closeModal=()=>document.getElementById("modal").style.display="none";

init();
</script>

</body>
</html>
