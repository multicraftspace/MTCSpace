<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const verifiedUsers = ["RedWorld"];
const recommendedServers = ["M5R9X1NY"];

let servers = [
  {id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP...",code:"M5R9X1NY",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
  {id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌...",code:"KAAYBNDP",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
  {id:3,name:"FlatWorld",desc:"Creative server...",code:"MCSRVR03",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
  {id:4,name:"New Types PvP",desc:"Awesome PvP...",code:"JLIVC3V9",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
  {id:5,name:"SMP12",desc:"Open world SMP...",code:"94D92LVD",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
  {id:6,name:"Stone Simulator",desc:"Mine & trade...",code:"XX9IXQ6H",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
  {id:7,name:"Parkour Cubicles",desc:"Beat 36 cubicles!",code:"QVZACNG5",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
];

async function loadVisits(server){
  const ref = doc(db,"servers",server.code);
  const snap = await getDoc(ref);

  if(snap.exists()){
    const data = snap.data();
    server.visits = data.visits || 0;
    server.lastVisits = data.lastVisits || 0;
  } else {
    server.visits = 0;
    server.lastVisits = 0;
  }

  // 🚀 SPEED (IMPORTANT FIX)
  server.growth = server.visits - server.lastVisits;
}

async function init(){
  await Promise.all(servers.map(loadVisits));

  // sort by visits (main list)
  servers.sort((a,b)=>b.visits-a.visits);

  const grid=document.getElementById("grid");
  grid.innerHTML="";

  // find top growth dynamically
  const maxGrowth = Math.max(...servers.map(s=>s.growth));

  servers.forEach(server=>{
    const recommended = recommendedServers.includes(server.code);

    // ✅ TRENDING BASED ON SPEED
    const trending = !recommended && server.growth > 0 && server.growth === maxGrowth;

    const verified = verifiedUsers.includes(server.author);

    const card=document.createElement("div");
    card.className="card"+
      (recommended?" recommended":"")+
      (trending?" trending":"");

    card.innerHTML=`
      ${recommended?'<div class="badge recommended">RECOMMENDED</div>':''}
      ${trending?'<div class="badge trending">TRENDING</div>':''}

      <img class="bg" src="${server.bg}" onerror="this.src='bgs/bg1.webp'">

      <div class="content">
        <div class="title-row">
          <img src="${server.heart}" width="18" onerror="this.src='hearts/hpvp.png'">
          <div class="name">${server.name}</div>
        </div>

        <div class="author">
          by ${server.author}
          ${verified?'<img class="check" src="assets/check.png">':''}
        </div>

        <div class="desc">${server.desc}</div>

        <div class="actions">
          <div class="visits">${server.visits} visits</div>
          <div class="play-btn" onclick="joinServer('${server.code}')">Play</div>
        </div>
      </div>
    `;

    grid.appendChild(card);
  });
}

// 🔥 IMPORTANT FIX: update lastVisits
window.joinServer = async function(code){
  const ref = doc(db,"servers",code);

  const snap = await getDoc(ref);
  let current = 0;

  if(snap.exists()){
    current = snap.data().visits || 0;
  }

  try{
    await updateDoc(ref,{
      visits: increment(1),
      lastVisits: current
    });
  }catch{
    await setDoc(ref,{
      visits:1,
      lastVisits:0
    });
  }

  location.href="server.html?code="+code;
};

// FIXED modal
window.openModal=()=>document.getElementById("modal").style.display="flex";
window.closeModal=()=>document.getElementById("modal").style.display="none";

init();
</script>
