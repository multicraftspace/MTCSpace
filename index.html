<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="0; url=https://mtcspace.com/m">
<title>MTCSpace</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 25px;
  border-bottom:2px solid #a855f7;
  gap:10px;
}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{height:40px;}

.search{
  padding:10px;
  border-radius:12px;
  border:2px solid #a855f7;
  width:260px;
  font-family:'MultiCraft';
}

.btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:25px;
  padding:30px;
}

.card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  background:white;
  box-shadow:0 15px 35px rgba(168,85,247,0.25);
  border:2px solid transparent;
}

.card.trending{border:2px solid red;}
.card.recommended{border:2px solid cyan;}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  padding:5px 10px;
  border-radius:10px;
  font-size:11px;
  z-index:5;
}
.badge.trending{background:red;color:white;}
.badge.recommended{background:cyan;color:black;}

.bg{width:100%;aspect-ratio:16/9;object-fit:cover;}

.content{padding:12px;}

.actions{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.fav{cursor:pointer;}
</style>
</head>

<body>

<div class="header">
  <div class="logo">
    <img src="assets/logo.png">
    <div>MTCSpace</div>
  </div>

  <input id="search" class="search" placeholder="Search servers...">

  <div>
    <button class="btn" onclick="openAdd()">+ Add my server</button>
    <button class="btn" onclick="contact()">📩</button>
    <button id="authBtn" class="btn" onclick="openAuth()">Sign Up</button>
  </div>
</div>

<div id="grid" class="grid"></div>

<!-- AUTH -->
<div id="authModal" style="display:none;position:fixed;top:0;width:100%;height:100%;background:#0005;">
  <div style="background:white;padding:20px;margin:100px auto;width:300px;border-radius:20px;">
    <h3>Account</h3>
    <input id="user" placeholder="Username"><br><br>
    <input id="pass" type="password" placeholder="Password"><br><br>
    <input id="pfp" placeholder="Profile picture URL (optional)"><br><br>
    <button onclick="signup()">Sign Up</button>
    <button onclick="login()">Login</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, getDocs, doc, getDoc,
  setDoc, updateDoc, increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain:"mcspaceomega.firebaseapp.com",
  projectId:"mcspaceomega"
});
const db = getFirestore(app);

let allServers=[];
let userLocal=localStorage.getItem("user");

if(userLocal) authBtn.innerText=userLocal;

/* AUTH */
window.signup=async()=>{
  const u=user.value;
  const p=pass.value;
  const pic=pfp.value||"no";

  const ref=doc(db,"users",u);
  if((await getDoc(ref)).exists()) return alert("Taken");

  await setDoc(ref,{password:p,pfp:pic,subs:0,desc:""});
  localStorage.setItem("user",u);
  authBtn.innerText=u;
  authModal.style.display="none";
};

window.login=async()=>{
  const snap=await getDoc(doc(db,"users",user.value));
  if(!snap.exists()) return alert("No user");
  if(snap.data().password!==pass.value) return alert("Wrong");

  localStorage.setItem("user",user.value);
  authBtn.innerText=user.value;
  authModal.style.display="none";
};

window.openAuth=()=>authModal.style.display="block";

/* LOAD SERVERS */
async function load(){
  const snap=await getDocs(collection(db,"servers"));
  allServers=[];

  snap.forEach(d=>{
    const s=d.data();
    s.code=d.id;
    s.growth=(s.visits||0)-(s.lastVisits||0);
    allServers.push(s);
  });

  render(allServers);
}

/* RENDER */
async function render(list){
  grid.innerHTML="";
  const maxGrowth=Math.max(...list.map(s=>s.growth||0),1);

  for(const s of list){
    const userSnap=await getDoc(doc(db,"users",s.author));
    const pfp=userSnap.exists()&&userSnap.data().pfp!=="no"
      ?userSnap.data().pfp:"assets/default.png";

    const trending=s.growth>maxGrowth*0.6;
    const favs=JSON.parse(localStorage.getItem("favs")||"[]");

    const card=document.createElement("div");
    card.className="card"+(trending?" trending":"");

    card.innerHTML=`
      ${trending?'<div class="badge trending">TRENDING</div>':''}
      <img class="bg" src="${s.bg}">
      <div class="content">
        <b>${s.name}</b><br>
        <small><img src="${pfp}" width="14"> ${s.author}</small>
        <p>${s.desc}</p>
        <div class="actions">
          <span>${s.visits||0} visits</span>
          <div>
            <span class="fav" onclick="fav('${s.code}')">
              ${favs.includes(s.code)?"❤️":"🤍"}
            </span>
            <button onclick="play('${s.code}')">Play</button>
          </div>
        </div>
      </div>
    `;
    grid.appendChild(card);
  }
}

/* FAVORITES */
window.fav=(c)=>{
  let f=JSON.parse(localStorage.getItem("favs")||"[]");
  f.includes(c)?f=f.filter(x=>x!==c):f.push(c);
  localStorage.setItem("favs",JSON.stringify(f));
  render(allServers);
};

/* SEARCH */
search.oninput=()=>{
  const q=search.value.toLowerCase();
  render(allServers.filter(s=>s.name.toLowerCase().includes(q)));
};

/* PLAY */
const COOLDOWN=600000;
window.play=async(c)=>{
  const key="v_"+c;
  const now=Date.now();

  if(!localStorage.getItem(key)||now-localStorage.getItem(key)>COOLDOWN){
    await updateDoc(doc(db,"servers",c),{visits:increment(1)});
    localStorage.setItem(key,now);
  }

  location.href="server.html?code="+c;
};

window.openAdd=()=>{
  if(!localStorage.getItem("user")) return openAuth();
  location.href="mailto:add@mtcspace.com";
};

window.contact=()=>location.href="mailto:contact@mtcspace.com";

load();
</script>
</body>
</html>
