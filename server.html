<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCspace</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('assets/MultiCraft.ttf');
}

body {
  margin:0;
  font-family:'MultiCraft', sans-serif;
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
}

.back,.copy-btn{
  padding:10px 16px;
  border-radius:12px;
  border:2px solid #a855f7;
  background:linear-gradient(135deg,#a855f7,#7e22ce);
  color:white;
  cursor:pointer;
  margin:20px;
}

.card{
  max-width:900px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 15px 40px rgba(168,85,247,0.25);
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:25px;}

.title-row{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
}

.author{
  width:100%;
  opacity:0.7;
}

.check{
  width:16px;
}

.invite{
  display:flex;
  margin-top:20px;
}

.invite input{
  flex:1;
  padding:12px;
  border:2px solid #a855f7;
  border-right:none;
  border-radius:12px 0 0 12px;
}

.copy-btn{
  border-radius:0 12px 12px 0;
}
</style>
</head>

<body>

<div class="back" onclick="location.href='index.html'">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <div class="title-row">
      <img id="heart" width="24">
      <h2 id="name">Loading...</h2>
      <img id="check" class="check" style="display:none;">
      <div id="author" class="author"></div>
    </div>

    <p id="desc"></p>

    <div class="invite">
      <input id="invite" readonly>
      <button class="copy-btn" onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script>
const servers = {
"M5R9X1NY": {name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, and more very cool features.",author:"RedWorld",bg:"bgs/bg1.png",heart:"hearts/hpvp.png"},
"KAAYBNDP": {name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",author:"Elder",bg:"bgs/bg2.png",heart:"hearts/hpvp.png"},
"MCSRVR03": {name:"FlatWorld",desc:"Creative Server",author:"Unknown",bg:"bgs/bg3.png",heart:"hearts/hc.png"},
"JLIVC3V9": {name:"New Types PvP",desc:"Awesome PvP server, with a lot fun features and gamemodes.",author:"Unknown",bg:"bgs/bg4.png",heart:"hearts/hpvp.png"},
"94D92LVD": {name:"SMP12",desc:"In here, it's your job to have fun!",author:"Jared12",bg:"bgs/bg5.png",heart:"hearts/hpvp.png"},
"XX9IXQ6H": {name:"Stone Simulator",desc:"We live underground and trade items!",author:"Jared12",bg:"bgs/bg6.png",heart:"hearts/hpvp.png"},
"QVZACNG5": {name:"Parkour Cubicles",desc:"Try to beat all 36 cubicles!",author:"Jared12",bg:"bgs/bg7.png",heart:"hearts/hpvp.png"}
};

const nameEl = document.getElementById("name");
const descEl = document.getElementById("desc");
const authorEl = document.getElementById("author");
const inviteEl = document.getElementById("invite");
const bgEl = document.getElementById("bg");
const heartEl = document.getElementById("heart");
const checkEl = document.getElementById("check");

const code = new URLSearchParams(window.location.search).get("code");
const server = servers[code];

if (!server) {
  nameEl.innerText = "Server not found";
  descEl.innerText = "Invalid or missing code.";
} else {
  nameEl.innerText = server.name;
  descEl.innerText = server.desc;
  authorEl.innerText = "by " + server.author;
  inviteEl.value = code;

  bgEl.src = server.bg;
  heartEl.src = server.heart;

  if (server.author === "RedWorld") {
    checkEl.src = "assets/check.png";
    checkEl.style.display = "inline";
  }

  document.title = server.name + " • MCspace";
}

function copyCode() {
  navigator.clipboard.writeText(inviteEl.value)
    .then(() => alert("Copied!"))
    .catch(() => alert("Failed to copy"));
}
</script>

</body>
</html>
