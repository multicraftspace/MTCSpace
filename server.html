<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft';
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
}

/* BUTTONS */
.back, .invite button {
  padding: 10px 16px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

.back {
  border-radius: 12px;
  margin: 20px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 1000px;
  margin: auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(168,85,247,0.25);
  position: relative;
}

.card.trending {
  border: 2px solid red;
}

.card.recommended {
  border: 2px solid cyan;
}

/* BADGES */
.badge {
  position: absolute;
  top: 15px;
  left: 15px;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 12px;
  color: white;
}

.badge.trending { background: red; }
.badge.recommended { background: cyan; color: black; top: 50px; }

.bg {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
}

.content {
  padding: 25px;
}

.title-row {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.title-row img { width: 26px; }

.author {
  font-size: 14px;
  opacity: 0.7;
}

.check {
  color: cyan;
  font-size: 14px;
}

#desc {
  margin-top: 10px;
  opacity: 0.8;
}

/* INVITE */
.invite-label {
  margin-top: 25px;
  font-size: 14px;
  opacity: 0.7;
}

.invite {
  display: flex;
  margin-top: 5px;
}

.invite input {
  flex: 1;
  padding: 12px;
  border: 2px solid #a855f7;
  border-right: none;
  border-radius: 12px 0 0 12px;
  outline: none;
  font-family: 'MultiCraft';
}

.invite button {
  border-left: none;
  border-radius: 0 12px 12px 0;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Back</div>

<div id="card" class="card">
  <img id="bg" class="bg">

  <div class="content">
    <div class="title-row">
      <img id="heart">
      <h2 id="name">Loading...</h2>
      <span id="author" class="author"></span>
      <span id="check" class="check"></span>
    </div>

    <p id="desc"></p>

    <div class="invite-label">Invite Code</div>

    <div class="invite">
      <input id="invite" readonly onclick="this.select()">
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ✅ FULL CONFIG (FIXED) */
const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* VERIFIED USERS */
const verifiedUsers = ["RedWorld"];

/* RECOMMENDED SERVERS */
const recommendedServers = ["M5R9X1NY"];

/* SERVERS */
const servers = {
  "M5R9X1NY": {id:1,name:"Erratic SMP",desc:"Good MultiCraft SMP with no areas, and more very cool features.",author:"RedWorld"},
  "KAAYBNDP": {id:2,name:"Ronaldo Vs Messi",desc:"BEST SERVER 👌, PARKOUR / PvP / MINI GAMES / BEDWARS / MANHUNT / TREASURE HUNT / BRIDGING / AXE PVP / AND MANY MORE .. ✨",author:"Elder"},
  "MCSRVR03": {id:3,name:"FlatWorld",desc:"Creative Server",author:"Unknown"},
  "JLIVC3V9": {id:4,name:"New Types PvP",desc:"Awesome PvP server, with a lot fun features and gamemodes.",author:"Unknown"},
  "94D92LVD": {id:5,name:"SMP12",desc:"In here, it's your job to have fun! The world open, PVP; it's a place where you can do anything!",author:"Jared12"},
  "XX9IXQ6H": {id:6,name:"Stone Simulator",desc:"In here, we live underground! Also, we buy items from The Shop! With currencies such as Stone, Cobblestone, and more!",author:"Jared12"},
  "QVZACNG5": {id:7,name:"Parkour Cubicles",desc:"In here, YOU will try to beat the impossible 36 cubicles of the server to escape!",author:"Jared12"}
};

const code = new URLSearchParams(window.location.search).get("code");
const s = servers[code];

if (s) {
  name.innerText = s.name;
  desc.innerText = s.desc;
  invite.value = code;
  author.innerText = "by " + s.author;

  if (verifiedUsers.includes(s.author)) check.innerText = "✔";

  bg.src = "bg" + s.id + ".png";
  heart.src = "heart" + s.id + ".png";

  bg.onerror = () => bg.src = "bg1.png";
  heart.onerror = () => heart.src = "heart1.png";

  /* TRENDING */
  const ref = doc(db,"servers",code);
  getDoc(ref).then(snap=>{
    const visits = snap.exists()?snap.data().visits||0:0;
    if (visits >= 5) {
      card.classList.add("trending");
      const b=document.createElement("div");
      b.className="badge trending";
      b.innerText="TRENDING";
      card.appendChild(b);
    }
  });

  /* RECOMMENDED */
  if (recommendedServers.includes(code)) {
    card.classList.add("recommended");
    const b=document.createElement("div");
    b.className="badge recommended";
    b.innerText="RECOMMENDED";
    card.appendChild(b);
  }

  document.title = s.name + " • MCspace";
}
</script>

</body>
</html>
