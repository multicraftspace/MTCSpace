<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server</title>

<style>
@font-face{
  font-family:'MultiCraft';
  src:url('assets/MultiCraft.ttf');
}

body{
  margin:0;
  font-family:'MultiCraft';
  background: radial-gradient(circle at top,#ffffff,#f3e8ff);
  color:#2d0b4e;
}

.container{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.bg{
  width:100%;
  aspect-ratio:16/9;
  object-fit:cover;
}

.content{padding:20px;}

.author{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
}
.author img{
  width:24px;
  height:24px;
  border-radius:50%;
}

.btn{
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#a855f7;
  color:white;
  cursor:pointer;
}

.comment-box{
  margin-top:20px;
}

input{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:2px solid #a855f7;
  margin-bottom:10px;
  font-family:'MultiCraft';
}

.comment{
  background:white;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <h2 id="name"></h2>

    <div id="authorBox" class="author"></div>

    <p id="desc"></p>

    <button class="btn" onclick="like()">👍 <span id="likes"></span></button>
    <button class="btn" onclick="dislike()">👎 <span id="dislikes"></span></button>
  </div>
</div>

<div class="comment-box">
  <h3>Comments</h3>

  <input id="cInput" placeholder="Write a comment...">
  <button class="btn" onclick="sendComment()">Send</button>

  <div id="comments"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore, doc, getDoc, updateDoc, increment,
collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
});

const db = getFirestore(app);

const code = new URLSearchParams(location.search).get("code");
let serverData=null;

/* LOAD SERVER */
async function load(){
  const snap = await getDoc(doc(db,"servers",code));
  if(!snap.exists()) return;

  const s = snap.data();
  serverData=s;

  name.innerText=s.name;
  desc.innerText=s.desc;
  bg.src=s.bg;

  likes.innerText=s.likes||0;
  dislikes.innerText=s.dislikes||0;

  loadAuthor(s.author);
  loadComments();
}

/* AUTHOR */
async function loadAuthor(username){
  const snap = await getDoc(doc(db,"users",username));
  const data = snap.exists()?snap.data():null;

  const pfp = data && data.pfp!=="no" ? data.pfp : "assets/default.png";

  authorBox.innerHTML = `
    <img src="${pfp}">
    <b>@${username}</b>
  `;

  authorBox.onclick = () => {
    location.href = "profiles.html?u=@"+username;
  };
}

/* LIKE SYSTEM */
window.like = ()=>updateDoc(doc(db,"servers",code),{likes:increment(1)});
window.dislike = ()=>updateDoc(doc(db,"servers",code),{dislikes:increment(1)});

/* COMMENTS */
async function loadComments(){
  comments.innerHTML="";
  const snap = await getDocs(collection(db,"comments"));

  snap.forEach(d=>{
    const c = d.data();
    if(c.server!==code) return;

    const div=document.createElement("div");
    div.className="comment";

    const authorMark = c.author===serverData.author ? " (AUTHOR)" : "";

    div.innerHTML = `
      <b>${c.author}${authorMark}</b><br>
      ${c.content}
    `;

    comments.appendChild(div);
  });
}

/* SEND COMMENT */
window.sendComment = async ()=>{
  const user = localStorage.getItem("user");
  if(!user) return alert("Login first");

  await addDoc(collection(db,"comments"),{
    server:code,
    content:cInput.value,
    author:user,
    likes:0,
    dislikes:0
  });

  cInput.value="";
  loadComments();
};

load();
</script>

</body>
</html>
