<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft';
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
}

/* BUTTON */
.back, .invite button {
  padding: 10px 16px;
  border-radius: 12px;
  border: 2px solid #a855f7;
  background: linear-gradient(135deg, #a855f7, #7e22ce);
  color: white;
  cursor: pointer;
  transition: all 0.25s ease;
}

.back:hover, .invite button:hover {
  transform: scale(1.05);
}

.back {
  margin: 20px;
}

/* CARD */
.card {
  width: 100%;
  max-width: 1000px;
  margin: auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
}

.content {
  padding: 25px;
}

.title-row {
  display: flex;
  gap: 10px;
  align-items: center;
}

.invite-label {
  margin-top: 20px;
  opacity: 0.7;
}

.invite {
  display: flex;
  gap: 5px;
}

.invite input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #a855f7;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <div class="title-row">
      <img id="heart" width="24">
      <h2 id="name">Loading...</h2>
    </div>

    <p id="desc"></p>

    <div class="invite-label">Invite Code</div>
    <div class="invite">
      <input id="invite" readonly>
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

initializeApp(firebaseConfig);
getFirestore();

const servers = {
  "M5R9X1NY": { id: 1, name: "Erratic SMP", desc: "Good MultiCraft SMP with no areas, and more very cool features." }
};

const code = new URLSearchParams(window.location.search).get("code");

if (servers[code]) {
  const s = servers[code];
  document.getElementById("name").innerText = s.name;
  document.getElementById("desc").innerText = s.desc;
  document.getElementById("invite").value = code;
  document.getElementById("bg").src = "bg" + s.id + ".png";
  document.getElementById("heart").src = "heart" + s.id + ".png";
}

window.copyCode = function() {
  navigator.clipboard.writeText(document.getElementById("invite").value);

  const msg = document.createElement("div");
  msg.innerText = "Copied!";
  msg.style.position = "fixed";
  msg.style.bottom = "20px";
  msg.style.left = "50%";
  msg.style.transform = "translateX(-50%)";
  msg.style.background = "#a855f7";
  msg.style.color = "white";
  msg.style.padding = "10px 20px";
  msg.style.borderRadius = "12px";

  document.body.appendChild(msg);
  setTimeout(() => msg.remove(), 2000);
};

window.goBack = function() {
  window.location.href = "index.html";
};
</script>

</body>
</html>
