<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Server</title>

<style>
@font-face {
  font-family: 'MultiCraft';
  src: url('MultiCraft.ttf');
}

body {
  margin: 0;
  font-family: 'MultiCraft';
  background: radial-gradient(circle at top, #ffffff, #f3e8ff);
}

.back {
  margin: 20px;
  cursor: pointer;
}

.card {
  width: 100%;
  max-width: 1000px;
  margin: auto;
  background: white;
  border-radius: 20px;
  overflow: hidden;
}

.bg {
  width: 100%;
  aspect-ratio: 16/9;
}

.content {
  padding: 25px;
}

.invite-label {
  margin-top: 20px;
  opacity: 0.7;
}

.invite {
  display: flex;
}

.invite input {
  flex: 1;
  padding: 12px;
  border: 2px solid #a855f7;
}

.invite button {
  background: #a855f7;
  color: white;
  padding: 12px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="back" onclick="goBack()">← Back</div>

<div class="card">
  <img id="bg" class="bg">
  <div class="content">
    <h2 id="name">Loading...</h2>
    <p id="desc"></p>

    <div class="invite-label">Invite Code</div>
    <div class="invite">
      <input id="invite" readonly>
      <button onclick="copyCode()">Copy</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD4An6C8ZEdiJsohwo76QuRxv1hhjNmRlI",
  authDomain: "mcspaceomega.firebaseapp.com",
  projectId: "mcspaceomega",
  storageBucket: "mcspaceomega.firebasestorage.app",
  messagingSenderId: "984192110931",
  appId: "1:984192110931:web:d7392a9815ab248c6391a6"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const servers = {
  "M5R9X1NY": { id: 1, name: "Erratic SMP", desc: "Good MultiCraft SMP with no areas, and more very cool features." }
};

const params = new URLSearchParams(window.location.search);
const code = params.get("code");

if (servers[code]) {
  const s = servers[code];

  document.getElementById("name").innerText = s.name;
  document.getElementById("desc").innerText = s.desc;
  document.getElementById("invite").value = code;
  document.getElementById("bg").src = "bg" + s.id + ".png";
}

window.copyCode = function() {
  const text = document.getElementById("invite").value;

  navigator.clipboard.writeText(text).then(() => {
    alert("Copied!");
  });
};

window.goBack = function() {
  window.location.href = "index.html";
};
</script>

</body>
</html>
